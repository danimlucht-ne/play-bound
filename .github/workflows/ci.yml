name: Discord Bot Games CI

on:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "deploy-commands.js"
      - "games/**"
      - "lib/**"
      - "models/**"
      - "models.js"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "deploy-commands.js"
      - "games/**"
      - "lib/**"
      - "models/**"
      - "models.js"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  test:
    name: Bot Test Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run go-live gate
        run: npm run test:go-live
