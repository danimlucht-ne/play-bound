name: PlayBound CI

on:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "apps/web/**"
      - "deploy-commands.js"
      - "games/**"
      - "lib/**"
      - "models/**"
      - "models.js"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "apps/web/**"
      - "deploy-commands.js"
      - "games/**"
      - "lib/**"
      - "models/**"
      - "models.js"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  test:
    name: Bot + web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run go-live gate
        run: npm run test:go-live

      - name: Marketing site (static + legal build)
        run: npm run web:test:static

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install chromium --with-deps

      - name: Marketing site (Playwright)
        run: npm run web:test:e2e
